name: Chzzk Smart Downloader
on:
  workflow_dispatch:
    inputs:
      url:
        description: '다운로드할 영상 주소'
        required: true
      file_name:
        description: '저장할 파일 이름 (선택사항, 확장자 미포함. 비워두면 영상 제목으로 저장)'
        required: false
      start_time:
        description: '시작 시간 (예: 00:00:00, 비워두면 처음부터)'
        required: false
      end_time:
        description: '종료 시간 (예: 01:00:00, 비워두면 끝까지)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install --upgrade yt-dlp

      - name: Download Video
        run: |
          URL="${{ github.event.inputs.url }}"
          CUSTOM_NAME="${{ github.event.inputs.file_name }}"
          START="${{ github.event.inputs.start_time }}"
          END="${{ github.event.inputs.end_time }}"
          
          # 사용자가 이름을 입력했으면 해당 이름으로, 비워뒀으면 기본 제목(title)으로 포맷 설정
          if [ -z "$CUSTOM_NAME" ]; then
            FILENAME_FORMAT="%(title)s.%(ext)s"
          else
            FILENAME_FORMAT="${CUSTOM_NAME}.%(ext)s"
          fi

          # 기본 yt-dlp 명령어
          YT_DLP_CMD="yt-dlp -f 'bv*+ba/b' -o '$FILENAME_FORMAT'"

          # 구간 다운로드 옵션 추가
          if [ ! -z "$START" ] || [ ! -z "$END" ]; then
            START="${START:-00:00:00}"
            if [ ! -z "$END" ]; then
              YT_DLP_CMD="$YT_DLP_CMD --download-sections '*$START-$END'"
              echo "지정된 구간($START ~ $END)을 다운로드합니다."
            else
              echo "시작 시간($START)부터 끝까지 다운로드합니다."
            fi
          else
            echo "전체 영상을 다운로드합니다."
          fi

          eval "$YT_DLP_CMD '$URL'"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chzzk-downloaded-video
          path: ./*.mp4
