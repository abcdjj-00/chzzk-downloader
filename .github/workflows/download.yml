name: Chzzk Smart Downloader
on:
  workflow_dispatch:
    inputs:
      url:
        description: '다운로드할 영상 주소'
        required: true
      start_time:
        description: '시작 시간 (예: 00:00:00, 비워두면 처음부터)'
        required: false
      end_time:
        description: '종료 시간 (예: 01:00:00, 비워두면 끝까지)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download Video
        run: |
          URL="${{ github.event.inputs.url }}"
          START="${{ github.event.inputs.start_time }}"
          END="${{ github.event.inputs.end_time }}"
          
          if [ -z "$START" ]; then
            START="00:00:00"
          fi

          FILENAME_FORMAT="%(title)s.%(ext)s"

          if [ -z "$END" ]; then
            echo "전체 영상을 다운로드합니다."
            yt-dlp -o "$FILENAME_FORMAT" "$URL"
          else
            echo "지정된 구간($START ~ $END)을 다운로드합니다."
            yt-dlp --download-sections "*$START-$END" -o "$FILENAME_FORMAT" "$URL"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chzzk-downloaded-video
          path: ./*.mp4
